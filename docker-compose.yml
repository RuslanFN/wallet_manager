version: '3.8'

services:
  wallet-manager:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://wallet_user:wallet_password@postgres:5432/wallet_db
      - DEBUG=True
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=wallet_db
      - POSTGRES_USER=wallet_user
      - POSTGRES_PASSWORD=wallet_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_user -d wallet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

# Default environment variables
# You can override these in a .env file
# APP_PORT=8000
# DATABASE_URL=postgresql+asyncpg://wallet_user:wallet_password@postgres:5432/wallet_db
# POSTGRES_DB=wallet_db
# POSTGRES_USER=wallet_user
# POSTGRES_PASSWORD=wallet_password
# POSTGRES_PORT=5432