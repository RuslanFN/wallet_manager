version: '3.8'

services:
  wallet-manager:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_USER=postgres
      - DB_PASS=qwe123
      - DB_NAME=wallet_manager
      - DB_HOST=postgres
      - DB_PORT=5432
      - DEBUG=True
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - .:/app
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=wallet_manager
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwe123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

